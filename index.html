<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ポケモン選出支援ツール | タイプ相性で対戦の3体選出を判定</title>
  <meta name="description" content="ポケモン対戦の選出をタイプ相性から支援する無料Webアプリです。自分と相手のパーティを入力し、攻撃倍率と被ダメージ倍率から選出すべき3体と対面担当を判定します。">
  <meta name="keywords" content="ポケモン,ポケモン対戦,ポケモン選出,タイプ相性,選出支援,相性判定">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://hirotomiyagawa.github.io/Pokemon-Team-Selection/">
  <link rel="icon" href="pokemon_selection_app_icon.png">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="ポケモン選出支援ツール">
  <meta property="og:title" content="ポケモン選出支援ツール | タイプ相性で対戦の3体選出を判定">
  <meta property="og:description" content="タイプ相性から攻撃倍率と被ダメージ倍率を計算し、ポケモン対戦で選出すべき3体を判定します。">
  <meta property="og:url" content="https://hirotomiyagawa.github.io/Pokemon-Team-Selection/">
  <meta property="og:image" content="https://hirotomiyagawa.github.io/Pokemon-Team-Selection/pokemon_selection_app_icon.png">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="ポケモン選出支援ツール">
  <meta name="twitter:description" content="タイプ相性からポケモン対戦の選出すべき3体を判定する無料Webアプリです。">
  <meta name="twitter:image" content="https://hirotomiyagawa.github.io/Pokemon-Team-Selection/pokemon_selection_app_icon.png">
  <link rel="stylesheet" href="styles.css">
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "ポケモン選出支援ツール",
      "applicationCategory": "GameApplication",
      "operatingSystem": "Web",
      "url": "https://hirotomiyagawa.github.io/Pokemon-Team-Selection/",
      "description": "ポケモン対戦の選出をタイプ相性から支援する無料Webアプリです。攻撃倍率と被ダメージ倍率から選出すべき3体を判定します。",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "JPY"
      }
    }
  </script>
</head>
<body>
  <main class="app-shell">
    <header class="app-header">
      <img class="app-logo" src="pokemon_selection_app_icon.png" alt="">
      <div>
        <h1>ポケモン相性判定と選出アドバイス</h1>
        <p>タイプ相性から攻撃倍率と被ダメージ倍率を総合スコア化します。</p>
      </div>
    </header>

    <section class="panel">
      <div class="section-title">
        <h2>自身のパーティ（6体）</h2>
        <div class="party-actions">
          <label class="party-name">
            <span>登録名</span>
            <input id="partyName" type="text" autocomplete="off">
          </label>
          <select id="partySelect" aria-label="登録済みパーティ"></select>
          <button id="saveParty" type="button">登録</button>
          <button id="loadParty" type="button">読込</button>
          <button id="deleteParty" type="button">削除</button>
        </div>
      </div>
      <div id="ownParty" class="party-grid"></div>
    </section>

    <section class="panel">
      <div class="section-title">
        <h2>相手のパーティ（6体）</h2>
      </div>
      <div id="opponentParty" class="party-grid"></div>
    </section>

    <div class="command-bar">
      <button id="sampleButton" type="button">サンプル入力</button>
      <button id="clearButton" type="button">入力をクリア</button>
      <button id="shareButton" type="button">共有URL作成</button>
      <button id="recommendButton" class="primary" type="button">選出する</button>
    </div>

    <section class="panel result-panel">
      <div class="section-title">
        <h2>判定結果</h2>
      </div>
      <pre id="resultText">自身と相手のポケモンを入力して、「選出する」を押してください。</pre>
      <div id="referenceLinks" class="reference-links" aria-live="polite"></div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
